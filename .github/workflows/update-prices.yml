name: Update Commodity Prices

on:
  schedule:
    # Run daily at 6:00 AM UTC (after US markets close, before Asia opens)
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/update_prices.py'
      - '.github/workflows/update-prices.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest commodity prices
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_prices.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/prices.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated prices
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "Auto-update commodity prices ${DATE}"
          git push
